packages:
  - "apps/*"
  - "packages/*"

# Allow post-install scripts only for the dependencies we explicitly trust.
# Everything else stays sandboxed.
#   esbuild  — fetches the per-platform native binary
#   @prisma/* / prisma — downloads the query/migration engine binaries
allowBuilds:
  esbuild: true
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
onlyBuiltDependencies:
  - esbuild
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
