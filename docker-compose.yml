# Local development Postgres. Matches the production engine (Supabase
# uses Postgres 15+) so behaviour is consistent between environments.
#
#   docker compose up -d        start
#   docker compose down         stop, keep data
#   docker compose down -v      stop and wipe data (resets the database)
#
# DATABASE_URL for apps/api/.env:
#   postgresql://postgres:postgres@localhost:5432/acme_salary

services:
  postgres:
    image: postgres:16-alpine
    container_name: acme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acme_salary
    ports:
      - "5432:5432"
    volumes:
      - acme_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acme_salary"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  acme_pgdata:
